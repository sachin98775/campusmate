<!DOCTYPE html>
<html>
<head>
    <title>Teacher Login Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; }
        .form-group { margin: 15px 0; }
        input, button { padding: 10px; margin: 5px; }
        .result { margin: 20px 0; padding: 15px; background: #f0f0f0; }
    </style>
</head>
<body>
    <h2>Teacher Login Test</h2>
    
    <div class="form-group">
        <label>Teacher Key:</label>
        <input type="text" id="teacherKey" value="KCPT001" placeholder="Enter teacher key">
    </div>
    
    <button onclick="testLogin()">Test Login</button>
    
    <div id="result" class="result"></div>
    
    <script>
        async function testLogin() {
            const teacherKey = document.getElementById('teacherKey').value;
            const resultDiv = document.getElementById('result');
            
            try {
                resultDiv.innerHTML = 'Testing login...';
                
                const response = await fetch('http://localhost:8000/temp-login.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        role: 'teacher',
                        teacherKey: teacherKey
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    resultDiv.innerHTML = `
                        <h3>Login Successful!</h3>
                        <p><strong>Name:</strong> ${data.user.name}</p>
                        <p><strong>Role:</strong> ${data.user.role}</p>
                        <p><strong>Teacher Key:</strong> ${data.user.teacherKey}</p>
                        <p><strong>Token:</strong> ${data.token}</p>
                        <p style="color: green;">You can now access the teacher dashboard!</p>
                    `;
                    
                    // Store token for testing
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('teacherData', JSON.stringify(data.user));
                } else {
                    resultDiv.innerHTML = `<p style="color: red;">Login failed: ${data.message}</p>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
